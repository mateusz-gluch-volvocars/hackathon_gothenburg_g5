apiVersion: apps/v1
kind: Deployment
metadata:
  name: pothole-laureate
  namespace: laureate
  labels:
    app: pothole-laureate
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pothole-laureate
  template:
    metadata:
      labels:
        app: pothole-laureate
    spec:
      serviceAccountName: pothole-laureate
      containers:
        - name: pothole-laureate
          image: europe-west1-docker.pkg.dev/vcc-ic-g05/laureate/pothole-laureate:v1
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MODE
              value: "live"
            - name: PROJECT_ID
              value: "vcc-ic-g05"
            # Guardian's broadcast banner: gs://<project>-broadcast/broadcast.txt
            - name: BROADCAST_BUCKET
              value: "vcc-ic-g05-broadcast"
            # OpenTelemetry: codelab Q2E-2 flips this on after wiring setup_otel().
            # Leave commented out so the initial deploy works without OTel deps active.
            # - name: OTEL_ENABLED
            #   value: "true"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
